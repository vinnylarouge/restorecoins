name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install minimal training deps
        run: |
          python -m pip install --upgrade pip
          # Only what the unit tests need — full requirements pull in torch.
          pip install numpy scipy Pillow pytest fastapi 'uvicorn[standard]' pydantic requests
      - name: Run weathering tests
        run: pytest training/tests -v

  frontend:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
