name: deploy-frontend

# Builds the Vite app and publishes it to GitHub Pages on every push to main.
# Spec §4.6: hosted on GitHub Pages; spec §10 (open): GitHub org / repo name
# still TBD — the workflow uses ${{ github.repository }} so it works regardless.

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Build
        env:
          # Inject the backend URL at build time so the production bundle
          # talks to the HF Space, not localhost. Set this as a repo variable.
          VITE_BACKEND_URL: ${{ vars.HF_SPACE_URL }}
          # base path = /<repo>/. If switching to a custom domain, override to "/".
          VITE_BASE: "/${{ github.event.repository.name }}/"
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
